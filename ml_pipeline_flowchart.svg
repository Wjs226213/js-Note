  <text x="1515" y="187" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD" font-style="italic">Multi-Face Classifier</text>
  <line x1="1435" y1="203" x2="1595" y2="203"
        stroke="white" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1515" y="227" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- SVM / Softmax</text>
  <text x="1515" y="253" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 深度学习分类</text>
  <text x="1515" y="279" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 身份识别输出</text>
  <line x1="265" y1="210" x2="373" y2="210"
        stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="287" y="184" width="76" height="22" rx="6" ry="6"
