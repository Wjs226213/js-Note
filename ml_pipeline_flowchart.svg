  <text x="155" y="253" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 多角度/光照</text>
  <text x="155" y="279" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 数据增强</text>
