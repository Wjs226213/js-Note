  <text x="325" y="214" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="11" font-weight="bold" fill="#1976D2">检测</text>
  <line x1="605" y1="230" x2="715" y2="230" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="629" y="200" width="72" height="20" rx="6" ry="6"
        fill="white" stroke="#1976D2" stroke-width="0.8" opacity="0.9"/>
  <text x="665" y="214" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="11" font-weight="bold" fill="#1976D2">裁剪对齐</text>
  <line x1="945" y1="230" x2="1055" y2="230" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="969" y="200" width="72" height="20" rx="6" ry="6"
        fill="white" stroke="#1976D2" stroke-width="0.8" opacity="0.9"/>
  <text x="1005" y="214" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="11" font-weight="bold" fill="#1976D2">特征向量</text>
  <line x1="1285" y1="230" x2="1395" y2="230" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="1309" y="200" width="72" height="20" rx="6" ry="6"
        fill="white" stroke="#1976D2" stroke-width="0.8" opacity="0.9"/>
  <text x="1345" y="214" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="11" font-weight="bold" fill="#1976D2">分类决策</text>
  <rect x="50" y="395" width="1300" height="40" rx="8" ry="8"
        fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.5"/>
  <text x="700" y="420" text-anchor="middle" font-family="SimSun, SimHei, Microsoft YaHei, sans-serif"
        font-size="11" fill="#757575">关键技术：Haar特征 + MTCNN人脸检测 → 直方图均衡化归一化 → CNN/PCA特征提取 → SVM/Softmax多分类</text>
</svg>