<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="460" viewBox="0 0 1400 460">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1976D2"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="460" fill="#FFFFFF"/>

  <!-- 标题 -->
  <text x="700" y="35" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="22" font-weight="bold" fill="#333333">机器学习多人脸识别流程</text>
  <text x="700" y="60" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" fill="#757575" font-style="italic">Multi-Face Recognition Pipeline based on Machine Learning</text>
  <rect x="53" y="93" width="210" height="280" rx="14" ry="14" fill="#E0E0E0" opacity="0.5"/>
  <rect x="50" y="90" width="210" height="280" rx="14" ry="14" fill="#66BB6A" opacity="0.92"/>
  <text x="155" y="130" text-anchor="middle" font-size="24">📷</text>
  <text x="155" y="160" text-anchor="middle"
