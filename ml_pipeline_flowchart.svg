  <circle cx="835" cy="125" r="20" fill="white" opacity="0.2"/>
  <text x="835" y="132" text-anchor="middle"
        font-family="SimHei, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">03</text>
  <text x="835" y="167" text-anchor="middle"
        font-family="SimHei, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">数据归一化</text>
  <text x="835" y="187" text-anchor="middle"
