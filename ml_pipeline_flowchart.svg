<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="112%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <marker id="arrowhead" markerWidth="14" markerHeight="10" refX="14" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#1976D2"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="420" fill="#FFFFFF"/>

  <!-- 标题 -->
  <text x="700" y="32" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="24" font-weight="bold" fill="#333333">机器学习多人脸识别流程</text>
  <text x="700" y="55" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" fill="#757575" font-style="italic">Multi-Face Recognition Pipeline based on Machine Learning</text>
  <line x1="500" y1="65" x2="900" y2="65" stroke="#2196F3" stroke-width="1.5" opacity="0.3"/>
  <rect x="53" y="88" width="210" height="250" rx="12" ry="12"
        fill="#000000" opacity="0.08" filter="url(#shadow)"/>
  <rect x="50" y="85" width="210" height="250" rx="12" ry="12"
        fill="#66BB6A" opacity="0.95"/>
  <rect x="50" y="85" width="210" height="6" rx="3" ry="3" fill="white" opacity="0.25"/>
  <circle cx="155" cy="125" r="20" fill="white" opacity="0.2"/>
  <text x="155" y="132" text-anchor="middle"
        font-family="SimHei, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">01</text>
  <text x="155" y="167" text-anchor="middle"
        font-family="SimHei, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">图像数据采集</text>
  <text x="155" y="187" text-anchor="middle"
