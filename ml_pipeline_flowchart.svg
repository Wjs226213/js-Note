  <text x="1175" y="275" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• LBP / HOG</text>
  <text x="1175" y="300" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• 降维PCA</text>
  <rect x="1413" y="93" width="210" height="280" rx="14" ry="14" fill="#E0E0E0" opacity="0.5"/>
