  <text x="835" y="200" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD" font-style="italic">Normalization</text>
  <line x1="750" y1="225" x2="920" y2="225" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
