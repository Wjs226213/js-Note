  <text x="1515" y="180" text-anchor="middle"
        font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">分类器</text>
  <text x="1515" y="200" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD" font-style="italic">Multi-Face</text>
  <text x="1515" y="215" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD" font-style="italic">Classifier</text>
  <line x1="1430" y1="225" x2="1600" y2="225" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1515" y="250" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• SVM / Softmax</text>
  <text x="1515" y="275" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• 深度学习分类</text>
  <text x="1515" y="300" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• 身份识别输出</text>
  <line x1="265" y1="230" x2="375" y2="230" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="303" y="200" width="44" height="20" rx="6" ry="6"
