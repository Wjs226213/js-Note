  <text x="155" y="275" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• 多角度/光照</text>
  <text x="155" y="300" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• 数据增强</text>
  <rect x="393" y="93" width="210" height="280" rx="14" ry="14" fill="#E0E0E0" opacity="0.5"/>
  <rect x="390" y="90" width="210" height="280" rx="14" ry="14" fill="#2196F3" opacity="0.92"/>
  <text x="495" y="130" text-anchor="middle" font-size="24">🔍</text>
  <text x="495" y="160" text-anchor="middle"
