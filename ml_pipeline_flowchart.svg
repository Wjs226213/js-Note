  <text x="1175" y="167" text-anchor="middle"
        font-family="SimHei, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">特征提取</text>
  <text x="1175" y="187" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD" font-style="italic">Feature Extraction</text>
  <line x1="1095" y1="203" x2="1255" y2="203"
        stroke="white" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1175" y="227" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- CNN 特征</text>
  <text x="1175" y="253" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- LBP / HOG</text>
  <text x="1175" y="279" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 降维 PCA</text>
  <rect x="1413" y="88" width="210" height="250" rx="12" ry="12"
        fill="#000000" opacity="0.08" filter="url(#shadow)"/>
  <rect x="1410" y="85" width="210" height="250" rx="12" ry="12"
        fill="#FF7043" opacity="0.95"/>
  <rect x="1410" y="85" width="210" height="6" rx="3" ry="3" fill="white" opacity="0.25"/>
  <circle cx="1515" cy="125" r="20" fill="white" opacity="0.2"/>
  <text x="1515" y="132" text-anchor="middle"
        font-family="SimHei, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">05</text>
  <text x="1515" y="167" text-anchor="middle"
