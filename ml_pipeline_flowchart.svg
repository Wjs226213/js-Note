  <text x="1175" y="200" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD" font-style="italic">Feature Extraction</text>
  <line x1="1090" y1="225" x2="1260" y2="225" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1175" y="250" text-anchor="middle"
