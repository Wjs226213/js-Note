  <text x="835" y="275" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• 尺寸统一</text>
  <text x="835" y="300" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• 像素值归一化</text>
  <rect x="1073" y="93" width="210" height="280" rx="14" ry="14" fill="#E0E0E0" opacity="0.5"/>
