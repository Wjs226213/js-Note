  <line x1="605" y1="210" x2="713" y2="210"
        stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="627" y="184" width="76" height="22" rx="6" ry="6"
        fill="white" stroke="#1976D2" stroke-width="0.8"/>
  <text x="665" y="199" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="11" font-weight="bold" fill="#1976D2">裁剪对齐</text>
  <line x1="945" y1="210" x2="1053" y2="210"
        stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="967" y="184" width="76" height="22" rx="6" ry="6"
        fill="white" stroke="#1976D2" stroke-width="0.8"/>
  <text x="1005" y="199" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="11" font-weight="bold" fill="#1976D2">特征向量</text>
  <line x1="1285" y1="210" x2="1393" y2="210"
        stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="1307" y="184" width="76" height="22" rx="6" ry="6"
        fill="white" stroke="#1976D2" stroke-width="0.8"/>
  <text x="1345" y="199" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif"
        font-size="11" font-weight="bold" fill="#1976D2">分类决策</text>
  <rect x="50" y="355" width="1300" height="36" rx="8" ry="8"
        fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.5"/>
  <text x="700" y="378" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="#757575">关键技术：Haar + MTCNN 人脸检测 → 直方图均衡化归一化 → CNN / PCA 特征提取 → SVM / Softmax 多分类</text>
</svg>