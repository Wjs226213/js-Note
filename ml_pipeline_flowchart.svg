  <line x1="755" y1="203" x2="915" y2="203"
        stroke="white" stroke-opacity="0.25" stroke-width="1"/>
  <text x="835" y="227" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 灰度转换</text>
  <text x="835" y="253" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 尺寸统一</text>
  <text x="835" y="279" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="white" opacity="0.92">- 像素值归一化</text>
  <rect x="1073" y="88" width="210" height="250" rx="12" ry="12"
