  <text x="495" y="275" text-anchor="middle"
        font-family="SimSun, SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="white" opacity="0.9">• MTCNN / YOLO</text>
  <text x="495" y="300" text-anchor="middle"
